<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#0f1f3d" />

    <title>Lớp NK — Quản lý giảng dạy</title>

    <!--
      FONT STRATEGY cho WebView mobile:
      1. Preconnect để giảm latency
      2. Be Vietnam Pro — font Google có Vietnamese coverage hoàn hảo, nhẹ hơn Nunito
      3. Nunito làm fallback khi Be Vietnam Pro không tải được
      4. display=swap để text luôn hiển thị ngay (tránh FOIT)
      5. Nếu cả 2 font fail → system-ui → font hệ thống (vẫn đúng tiếng Việt)
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Be Vietnam Pro: full Vietnamese Unicode block (U+0300–U+036F, U+1E00–U+1EFF)
      Đây là font Google được tối ưu riêng cho tiếng Việt
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap"
    />

    <!--
      Fallback inline: nếu Google Fonts bị block (WebView offline / firewall)
      Dùng system fonts có Vietnamese support trên Android/iOS
    -->
    <style>
      /* Emergency font fallback — chạy ngay khi HTML load, trước JS */
      :root {
        --font-vn: 'Be Vietnam Pro', 'Nunito', system-ui, -apple-system,
          'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          /* Android Vietnamese */ 'Noto Sans', 'Droid Sans',
          /* iOS/macOS Vietnamese */ 'PingFang SC',
          sans-serif;
      }
      html { font-family: var(--font-vn); }
      body { font-family: var(--font-vn); }

      /* Chặn invisible text trong khi font load */
      @font-face {
        font-family: 'Be Vietnam Pro';
        font-display: swap;
      }
      @font-face {
        font-family: 'Nunito';
        font-display: swap;
      }

      /* Safe area iOS notch/home bar */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }

      /* Prevent iOS font size adjustment */
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      /* Prevent horizontal scroll */
      html, body { overflow-x: hidden; }

      /* Loading screen trước khi React mount */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background: #f8fafc;
      }
      #root:empty::after {
        content: 'Đang tải…';
        font-family: var(--font-vn);
        font-size: 15px;
        font-weight: 700;
        color: #94a3b8;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
