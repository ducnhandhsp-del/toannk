<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <!--
      viewport-fit=cover: nội dung mở rộng vào vùng notch/home bar trên iOS
      Kết hợp với env(safe-area-inset-*) trong CSS để tránh bị che
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#0f1f3d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Lớp NK — Quản lý giảng dạy</title>

    <!--
      FONT STRATEGY cho WebView mobile:
      - preconnect giảm DNS/TLS latency
      - Dùng <link> thay @import trong CSS (load song song, không blocking)
      - Be Vietnam Pro: font Google thiết kế riêng cho tiếng Việt
        → có đầy đủ Unicode block U+1E00–U+1EFF (tất cả tổ hợp dấu VN)
      - Nunito: fallback quen thuộc
      - display=swap: text hiển thị ngay bằng fallback font, swap khi load xong
        → tránh FOIT (Flash of Invisible Text) trên WebView chậm
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap"
    />

    <style>
      /*
        Inline critical CSS — chạy ngay khi HTML parse, trước khi JS/CSS bundle load.
        Đảm bảo font stack đúng ngay từ đầu, không chờ bundle.
      */

      :root {
        /* CSS custom properties cho safe-area (notch, home bar) */
        --sat: env(safe-area-inset-top,    0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left,   0px);
        --sar: env(safe-area-inset-right,  0px);

        /* Font stack ưu tiên Be Vietnam Pro */
        --font-vn:
          'Be Vietnam Pro',
          'Nunito',
          system-ui,
          -apple-system,        /* San Francisco — iOS/macOS, full VN */
          'Segoe UI',           /* Windows */
          Roboto,               /* Android mới */
          'Noto Sans',          /* Android, full VN Unicode */
          'Helvetica Neue',
          Arial,
          sans-serif;
      }

      /* Áp dụng font ngay lập tức — trước khi bundle CSS load */
      html, body {
        font-family: var(--font-vn);
        -webkit-text-size-adjust: 100%; /* Tránh iOS tự tăng font size */
        text-size-adjust: 100%;
        overflow-x: hidden;
        margin: 0;
      }

      /* Tránh horizontal scroll trên mobile */
      * { box-sizing: border-box; }

      /* Loading placeholder trước khi React mount */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background: #f8fafc;
        font-family: var(--font-vn);
      }
      #root:empty::after {
        content: 'Đang tải…';
        font-size: 14px;
        font-weight: 700;
        color: #94a3b8;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
